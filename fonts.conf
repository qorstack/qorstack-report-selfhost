<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>/usr/local/share/fonts/custom</dir>

  <!-- ── Reject non-Kinnari Thai system fonts ───────────────────────────────
       Ensures Kinnari is the only Thai fallback when no custom font is uploaded.
  -->
  <selectfont>
    <rejectfont>
      <pattern><patelt name="family"><string>Noto Sans Thai</string></patelt></pattern>
      <pattern><patelt name="family"><string>Noto Sans Thai UI</string></patelt></pattern>
      <pattern><patelt name="family"><string>Noto Serif Thai</string></patelt></pattern>
      <pattern><patelt name="family"><string>Noto Looped Thai</string></patelt></pattern>
      <pattern><patelt name="family"><string>Noto Looped Thai UI</string></patelt></pattern>
      <pattern><patelt name="family"><string>Garuda</string></patelt></pattern>
      <pattern><patelt name="family"><string>Loma</string></patelt></pattern>
    </rejectfont>
  </selectfont>

  <!-- ── Thai font aliases: use uploaded font first, Kinnari as fallback ──── -->
  <alias><family>TH Sarabun New</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>THSarabunNew</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>TH SarabunPSK</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>TH SarabunIT๙</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>Angsana New</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>AngsanaUPC</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>Cordia New</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>CordiaUPC</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>Browallia New</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>BrowalliaUPC</family><accept><family>Kinnari</family></accept></alias>
  <alias><family>EucrosiaUPC</family><accept><family>Kinnari</family></accept></alias>

  <!-- ── Latin metric-compatible substitutions ──────────────────────────── -->
  <alias><family>Times New Roman</family><accept><family>Tinos</family></accept></alias>
  <alias><family>Times</family><accept><family>Tinos</family></accept></alias>
  <alias><family>Arial</family><accept><family>Arimo</family></accept></alias>
  <alias><family>Courier New</family><accept><family>Cousine</family></accept></alias>
  <alias><family>Courier</family><accept><family>Cousine</family></accept></alias>
  <alias><family>Calibri</family><accept><family>Carlito</family></accept></alias>
  <alias><family>Cambria</family><accept><family>Caladea</family></accept></alias>

  <!-- ── Generic family fallbacks ───────────────────────────────────────── -->
  <alias>
    <family>serif</family>
    <prefer><family>Tinos</family><family>Kinnari</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>Arimo</family><family>Kinnari</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>Cousine</family><family>Kinnari</family></prefer>
  </alias>

  <!-- ── Rendering quality ──────────────────────────────────────────────── -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>

</fontconfig>
